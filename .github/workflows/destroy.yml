name: Destroy Demo Environment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm infrastructure teardown'
        required: true
        default: ''

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  destroy:
    name: 'Terraform Destroy + Cleanup'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=us-central1" \
            -var="cluster_name=demo-gke-cluster" \
            -var="environment=demo"

      - name: Cleanup leftover resources
        if: always()
        run: |
          # Delete any leftover disks in us-central1
          gcloud compute disks list --filter="zone:us-central1" --format="value(name,zone)" | while read disk zone; do
            echo "Deleting disk: $disk ($zone)"
            gcloud compute disks delete "$disk" --zone="$zone" --quiet || true
          done
          echo "Infrastructure teardown complete."
