replicaCount: 2
image:
  repository: nginx
  tag: "1.25"
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "64Mi"    # DELIBERATE: limit < request → OOMKill on startup
    cpu: "500m"
readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
