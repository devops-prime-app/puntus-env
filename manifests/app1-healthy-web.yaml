# ✅ HEALTHY — nginx serving traffic
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-web-frontend
  namespace: demo-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1-web-frontend
  template:
    metadata:
      labels:
        app: app1-web-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app1-web-frontend
  namespace: demo-apps
spec:
  selector:
    app: app1-web-frontend
  ports:
  - port: 80
    targetPort: 80
