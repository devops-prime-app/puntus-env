# ✅ HEALTHY — Message queue worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app4-queue-worker
  namespace: demo-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app4-queue-worker
  template:
    metadata:
      labels:
        app: app4-queue-worker
    spec:
      containers:
      - name: worker
        image: alpine:3.19
        command: ["sh", "-c", "while true; do echo 'Processing jobs...'; sleep 30; done"]
